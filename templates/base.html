<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}BD Viagens{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/global.css') }}">
    
    {% block extra_css %}{% endblock %}
</head>
<body>

    <nav class="navbar">
        <h2>BD Viagens</h2>
        <div class="navbar-links">
            <a href="/pacotes">Pacotes Destaque</a>
            <a href="/voos">Buscar Voos</a>

            <div class="dropdown">
                <button class="dropbtn">📊 Consultas do Trabalho ▾</button>
                <div class="dropdown-content">
                    <a href="/carrinhos-acumulados">🛍️ Carrinhos Acumulados</a>
                    <a href="/busca-clientes">🔍 Busca Clientes</a>
                    <a href="/carrinho-sem-pedido">⚠️ Sem Pedido</a>
                    <a href="/detalhes-pacotes">🏷️ Ofertas</a>
                    <a href="/passageiros-nao-latam">✈️ Fora LATAM</a>
                    <a href="/detalhes-passagens">🎟️ Detalhes Passagens</a>
                    <a href="/comparativo-hoteis">🏨 Comparativo Hotéis</a>
                </div>
            </div>

            <a href="/carrinho" style="background-color: #2563eb; color: white; padding: 5px 12px; border-radius: 6px; font-weight: bold; margin-left: 10px;">🛒 Carrinho</a>
        </div>
    </nav>

    <div class="conteudo-principal">
        {% block content %}{% endblock %}
    </div>

</body>
</html>
